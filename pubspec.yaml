name: t2_mobile_application
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">= 3.11.3 < 4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: 9.1.1
  flutter_screenutil: 5.9.3
  cached_network_image: 3.4.1
  flutter_svg: 2.2.4
  bloc: 9.2.0
  get_it: 9.2.1
  injectable: 2.7.1+4
  hive_ce: 2.19.3
  hive_ce_flutter: 2.3.4
  go_router: 17.2.0
  equatable: 2.0.8
  dartz: 0.10.1
  flutter_dotenv: 6.0.0
  flutter_secure_storage: 10.0.0
  permission_handler: 12.0.1
  geolocator: 14.0.2
  flutter_local_notifications: 21.0.0
  confetti: ^0.8.0
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: 2.13.1
  injectable_generator: 2.12.1
  hive_ce_generator: 1.11.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/svgs/
    - assets/imgs/
    - assets/audio/
    - .env

  fonts:
    - family: T2HalvarBreit
      fonts:
        - asset: "assets/fonts/Halvar Breitschrift/T2HalvarBreit-ExtraBold.ttf"
    - family: T2HalvarStencilBreit
      fonts:
        - asset: "assets/fonts/Halvar Breitschrift/T2HalvarStencilBreit-ExtraBoldMidGap.ttf"
    - family: Rooftop
      fonts:
        - asset: assets/fonts/rooftop/t2-Rooftop-Regular.otf
        - asset: assets/fonts/rooftop/t2-Rooftop-Medium.otf
          weight: 500
